<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Demo</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 120px; font-family: monospace; font-size: 14px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { margin-top: 24px; }
    #result pre { background: #f4f4f4; padding: 16px; overflow: auto; white-space: pre-wrap; word-break: break-word; }
    #result code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; font-size: 13px; }
    #result h1, #result h2, #result h3 { font-family: sans-serif; }
    #result p { font-family: sans-serif; line-height: 1.6; }
    #result ul, #result ol { font-family: sans-serif; line-height: 1.6; }
    #result a { color: #0066cc; }
    #status { margin-top: 8px; color: #666; font-size: 13px; }
  </style>
  <script src="/marked.min.js"></script>
</head>
<body>
  <h1>Q Demo</h1>
  <form id="form">
    <label for="secret"><strong>Secret Key</strong></label>
    <br>
    <input id="secret" type="text" placeholder="Secret key" required style="width:100%;font-family:monospace;font-size:14px;padding:8px;box-sizing:border-box;margin-bottom:16px;">
    <br>
    <label for="question"><strong>Question</strong></label>
    <br>
    <textarea id="question" placeholder="Enter your question..." required></textarea>
    <br>
    <button type="submit" id="submit">Submit</button>
    <span id="status"></span>
  </form>
  <div id="result"></div>

  <script>
    const form = document.getElementById('form');
    const secretEl = document.getElementById('secret');
    const questionEl = document.getElementById('question');
    const submitBtn = document.getElementById('submit');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    secretEl.value = localStorage.getItem('q-demo-secret') || '';
    secretEl.addEventListener('input', () => {
      localStorage.setItem('q-demo-secret', secretEl.value);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = questionEl.value.trim();
      const secret = secretEl.value.trim();
      if (!question || !secret) return;

      submitBtn.disabled = true;
      statusEl.textContent = 'Loading...';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/q-demo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-secret-key': secret },
          body: JSON.stringify({ question }),
        });
        if (!res.ok) {
          const text = await res.text();
          resultEl.innerHTML = `<pre>Error ${res.status}: ${text}</pre>`;
          statusEl.textContent = 'Error';
          return;
        }
        const data = await res.json();
        resultEl.innerHTML = marked.parse(data.text ?? '');
        statusEl.textContent = `Done (${data.steps} step${data.steps !== 1 ? 's' : ''})`;
      } catch (err) {
        resultEl.innerHTML = `<pre>Error: ${err.message}</pre>`;
        statusEl.textContent = 'Failed';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
